# =============================================================================
# GEA EOR SaaS — Nginx 站点配置（三子域名版）
# =============================================================================
# 初始版本：仅 HTTP（用于首次部署和 SSL 证书申请）
# SSL 证书申请成功后，运行 enable-ssl.sh 脚本自动切换为 HTTPS
# =============================================================================
# 子域名路由：
#   admin.geahr.com  → 管理后台（Admin Dashboard）
#   app.geahr.com    → 客户门户（Client Portal）
#   worker.geahr.com → 员工门户（Worker Portal）
# =============================================================================

# 上游应用服务器
upstream gea_app {
    server app:3000;
    keepalive 32;
}

# ─── HTTP 服务器（管理后台 + 客户门户）──────────────────────────────────────
server {
    listen 80;
    server_name admin.geahr.com app.geahr.com;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 50m;

    # API 请求代理到 Node.js
    location /api/ {
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 所有其他请求代理到 Node.js
    location / {
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://gea_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ─── HTTP 服务器（员工门户）─────────────────────────────────────────────────
server {
    listen 80;
    server_name worker.geahr.com;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 50m;

    # Worker API 请求直接代理
    location /api/ {
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 已经以 /worker 开头的请求直接代理
    location /worker {
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # worker.geahr.com 根路径和非 /worker 路径重写为 /worker 前缀
    location / {
        rewrite ^/$ /worker/ break;
        rewrite ^/(?!worker/)(.*)$ /worker/$1 break;
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://gea_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ─── 默认服务器（IP 直接访问或未知域名）────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 重定向到管理后台
    location / {
        return 301 http://admin.geahr.com$request_uri;
    }
}
