# =============================================================================
# GEA EOR SaaS — Nginx HTTPS 配置（三子域名版）
# =============================================================================
# 子域名路由：
#   admin.geahr.com  → 管理后台（Admin Dashboard）
#   app.geahr.com    → 客户门户（Client Portal）
#   worker.geahr.com → 员工门户（Worker Portal）
#
# SSL 证书由 Let's Encrypt (certbot) 管理，自动续期。
# 三个域名共用一张 SAN 证书，存放在 admin.geahr.com 目录下。
# 证书路径：/etc/letsencrypt/live/admin.geahr.com/
# =============================================================================

# 上游应用服务器
upstream gea_app {
    server app:3000;
    keepalive 32;
}

# ─── HTTP → HTTPS 重定向（所有域名）───────────────────────────────────────
server {
    listen 80;
    server_name admin.geahr.com app.geahr.com worker.geahr.com;

    # Let's Encrypt 验证路径（必须保留，certbot 续期需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── 管理后台 HTTPS ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.geahr.com;

    ssl_certificate /etc/letsencrypt/live/admin.geahr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.geahr.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 50m;

    # 屏蔽 .git 等敏感目录
    location ~ /\.git {
        deny all;
        return 404;
    }

    # API 请求代理到 Node.js
    location /api/ {
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 所有其他请求代理到 Node.js
    location / {
        proxy_pass http://gea_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://gea_app;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

