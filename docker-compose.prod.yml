# =============================================================================
# GEA EOR SaaS Admin — 生产环境 Docker Compose 配置
# 阿里云马来西亚（吉隆坡）节点 ap-southeast-3
# =============================================================================
# 使用方法：docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────
  # 应用服务 (Node.js)
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gea-saas-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/data/production.db
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL:-simon.ding@geahr.com}
      - ADMIN_BOOTSTRAP_NAME=${ADMIN_BOOTSTRAP_NAME:-Simon Ding}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD}
      - ADMIN_APP_URL=${ADMIN_APP_URL:-https://admin.geahr.com}
      - PORTAL_APP_URL=${PORTAL_APP_URL:-https://app.geahr.com}
      - WORKER_APP_URL=${WORKER_APP_URL:-https://app.geahr.com/worker}
      # 阿里云 OSS (马来西亚吉隆坡节点)
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_REGION=${OSS_REGION:-oss-ap-southeast-3}
      - OSS_BUCKET=${OSS_BUCKET}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-https://oss-ap-southeast-3.aliyuncs.com}
      # 邮件
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-465}
      - EMAIL_SMTP_USER=${EMAIL_SMTP_USER}
      - EMAIL_SMTP_PASS=${EMAIL_SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM:-no-reply@geahr.com}
      - EMAIL_ADMIN=${EMAIL_ADMIN:-admin@geahr.com}
      # AI (可选)
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      # 持久化 SQLite 数据库文件
      - gea_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx 反向代理
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gea-saas-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Certbot (SSL 证书自动续期)
  # ─────────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: gea-saas-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  gea_data:
    driver: local
