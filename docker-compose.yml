services:
  app:
    build: .
    container_name: gea-saas-admin
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - BUILT_IN_FORGE_API_URL=${BUILT_IN_FORGE_API_URL}
      - BUILT_IN_FORGE_API_KEY=${BUILT_IN_FORGE_API_KEY}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_REGION=${OSS_REGION}
      - OSS_BUCKET=${OSS_BUCKET}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL}
      - ADMIN_BOOTSTRAP_NAME=${ADMIN_BOOTSTRAP_NAME}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD}
      - ADMIN_APP_URL=${ADMIN_APP_URL}
      - PORTAL_APP_URL=${PORTAL_APP_URL}
      - WORKER_APP_URL=${WORKER_APP_URL}
    volumes:
      - ./app-data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: gea-saas-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-gea_saas}
      MYSQL_USER: ${DB_USER:-gea_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gea_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
